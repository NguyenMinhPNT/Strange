name: strange
description: "Time management app — track focused work sessions across Learning, Projects, and Habits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.4
  shared_preferences: ^2.3.3

  # Background Timer
  flutter_foreground_task: ^8.14.0

  # Charts
  fl_chart: ^0.69.0

  # UI / Animations
  lottie: ^3.1.3
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1

  # Utilities
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2

  # i18n
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  injectable_generator: ^2.6.2
  drift_dev: ^2.21.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
